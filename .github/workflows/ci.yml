name: CI — Build & Lint

on:
  push:
    branches: ["main", "fix/**", "feat/**", "chore/**"]
  pull_request:
    branches: ["main"]

jobs:
  # ─── Frontend: Install, Lint, Build ─────────────────────────────────────────
  frontend:
    name: Frontend (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [20.x]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Lint (ESLint)
        run: npm run lint

      - name: Build production bundle
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 7

  # ─── Backend: Install & Type-check ──────────────────────────────────────────
  backend:
    name: Backend (Python 3.10)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: pip install --no-cache-dir -r backend/requirements.txt

      - name: Check backend syntax (py_compile)
        run: python -m py_compile backend/app.py && echo "✅ backend/app.py syntax OK"

      - name: Verify FastAPI app imports cleanly
        run: |
          python -c "
          import sys, os
          sys.path.insert(0, '.')
          # Patch OpenCV headless env so DeepFace doesn't crash on import
          os.environ.setdefault('MPLBACKEND', 'Agg')
          from backend.app import app
          print('✅ FastAPI app imported successfully')
          "
